<!DOCTYPE html>
<html>
<head><title>{{ title }}</title></head>
<body>
    <h1>{{ title }}</h1>
    <form method="POST">
        {{ form.hidden_tag() }}

        {% for field in form if field.widget.input_type != 'hidden' %}
            <div>
                {{ field.label }}<br>
                {{ field() }}
            </div>
        {% endfor %}
        <br>
        <button type="submit">Відправити</button>
    </form>
</body>
</html>
